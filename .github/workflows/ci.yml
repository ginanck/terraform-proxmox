name: CI/CD Pipeline

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9.21'

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: '1.8.8'

      - name: Install terraform-docs
        run: |
          cd /tmp
          curl -sSLo ./terraform-docs.tar.gz https://github.com/terraform-docs/terraform-docs/releases/download/v0.19.0/terraform-docs-v0.19.0-$(uname)-amd64.tar.gz
          tar -xzf terraform-docs.tar.gz
          chmod +x terraform-docs
          sudo mv terraform-docs /usr/local/bin/terraform-docs
          terraform-docs --version

      - name: Install tflint
        run: |
          curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
          tflint --version

      - name: Install Gitleaks
        run: |
          cd /tmp
          curl -sSLo gitleaks.tar.gz https://github.com/gitleaks/gitleaks/releases/download/v8.28.0/gitleaks_8.28.0_linux_x64.tar.gz
          tar -xzf gitleaks.tar.gz
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Cache pre-commit environments
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: Install pre-commit
        run: |
          pip install pre-commit
          pre-commit --version

      - name: Run pre-commit hooks
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Check for changes
        id: verify-changed-files
        run: |
          if [[ $(git status --porcelain) ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            git status --porcelain
          else
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          fi

      - name: Fail if changes are needed
        if: steps.verify-changed-files.outputs.changes == 'true' && github.event_name == 'push'
        run: |
          echo "❌ Pre-commit hooks made changes. Please run 'pre-commit run --all-files' locally and commit the changes."
          exit 1

      - name: Comment on PR with changes
        if: steps.verify-changed-files.outputs.changes == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ **Pre-commit hooks made changes to the code**\n\nPlease review the changes and update your branch accordingly.'
            })

  collect-examples:
    name: Collect Examples
    runs-on: ubuntu-latest
    outputs:
      examples: ${{ steps.find.outputs.examples }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Find example directories
        id: find
        run: |
          examples=$(find examples -mindepth 1 -maxdepth 1 -type d | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "examples=$examples" >> $GITHUB_OUTPUT
          echo "Found examples: $examples"

  tofu-validate:
    name: "Validate: ${{ matrix.example }}"
    runs-on: ubuntu-latest
    needs: collect-examples
    strategy:
      fail-fast: false
      matrix:
        example: ${{ fromJson(needs.collect-examples.outputs.examples) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: '1.8.8'

      - name: OpenTofu Init
        working-directory: ${{ matrix.example }}
        run: tofu init -upgrade -backend=false

      - name: OpenTofu Validate
        working-directory: ${{ matrix.example }}
        run: tofu validate

      - name: Comment validation failure on PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ **OpenTofu validation failed for \`${{ matrix.example }}\`**\n\nPlease check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.`
            })

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [pre-commit, tofu-validate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: ""
          custom_release_rules: "fix:patch,feat:minor,perf:minor,refactor:patch,BREAKING CHANGE:major"

      - name: Create GitHub Release
        if: steps.tag.outputs.new_tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
          generate_release_notes: true
